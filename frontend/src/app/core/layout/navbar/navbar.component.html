<nav class="navbar">

  <!-- Logo -->
  <hb-hiker-logo />

  <!-- Desktop nav links -->
  <ul class="nav-links" [class.nav-links--open]="menuOpen()">
    @for (link of navLinks; track link.label) {
      <li>
        <a
          [routerLink]="link.routerLink"
          [fragment]="link.fragment"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.routerLink === '/' }"
          (click)="closeMenu()"
        >{{ link.label }}</a>
      </li>
    }
  </ul>

  <!-- Search button -->
  <button
    mat-icon-button
    class="search-btn"
    aria-label="Search trails"
    (click)="openSearch()"
  >
    <mat-icon>search</mat-icon>
  </button>

  <!-- Auth buttons — top-right -->
  <div class="auth-buttons">
    @if (isLoggedIn()) {
      @if (!onFeed() && !onDashboard()) {
        <a routerLink="/feed" class="btn-login">Feed</a>
      }

      <!-- Avatar trigger -->
      <button class="nav-avatar" [matMenuTriggerFor]="userMenu" aria-label="My profile">
        @if (currentUser()?.avatarUrl) {
          <img class="nav-avatar-img" [src]="currentUser()!.avatarUrl" [alt]="currentUser()!.username">
        } @else {
          <span class="nav-avatar-initials">{{ initials(currentUser()?.username) }}</span>
        }
      </button>

      <!-- User dropdown -->
      <mat-menu #userMenu="matMenu" class="nav-user-menu">
        <a mat-menu-item routerLink="/dashboard">
          <mat-icon>dashboard</mat-icon>
          My Dashboard
        </a>
        <a mat-menu-item routerLink="/dashboard/profile">
          <mat-icon>settings</mat-icon>
          Settings
        </a>
        <mat-divider />
        <button mat-menu-item (click)="logout()">
          <mat-icon class="icon-danger">logout</mat-icon>
          <span class="text-danger">Sign out</span>
        </button>
      </mat-menu>

    } @else {
      <a routerLink="/auth/login"    class="btn-login">Log In</a>
      <a routerLink="/auth/register" class="btn-signup">Sign Up</a>
    }
  </div>

  <!-- Hamburger (mobile) -->
  <button
    mat-icon-button
    class="menu-btn"
    aria-label="Toggle menu"
    [attr.aria-expanded]="menuOpen()"
    (click)="toggleMenu()"
  >
    <mat-icon>{{ menuOpen() ? 'close' : 'menu' }}</mat-icon>
  </button>

</nav>

<!-- Search overlay — rendered outside nav flow -->
<hb-search-overlay [isOpen]="searchOpen()" (closed)="closeSearch()" />
