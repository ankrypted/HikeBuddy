<div class="chat-widget">

  <!-- ── Conversation panel ───────────────────────────────────────── -->
  <div class="chat-panel" [class.chat-panel--open]="open()">
    <div class="cp-header">
      <span class="cp-title">Messages</span>
      <button class="cp-close" (click)="toggle()" aria-label="Close messages">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="cp-list">
      @for (convo of conversations; track convo.id) {
        <button class="cp-item">
          <div class="cp-avatar">{{ initials(convo.username) }}</div>
          <div class="cp-info">
            <div class="cp-row">
              <span class="cp-name">{{ convo.username }}</span>
              <span class="cp-time">{{ convo.time }}</span>
            </div>
            <span class="cp-preview" [class.cp-preview--unread]="convo.unread > 0">
              {{ convo.lastMessage }}
            </span>
          </div>
          @if (convo.unread > 0) {
            <span class="cp-badge">{{ convo.unread }}</span>
          }
        </button>
      }
    </div>
  </div>

  <!-- ── FAB button ────────────────────────────────────────────────── -->
  <button class="chat-fab" (click)="toggle()" aria-label="Toggle messages">
    @if (open()) {
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    } @else {
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
    @if (!open() && totalUnread > 0) {
      <span class="fab-badge">{{ totalUnread }}</span>
    }
  </button>

</div>
