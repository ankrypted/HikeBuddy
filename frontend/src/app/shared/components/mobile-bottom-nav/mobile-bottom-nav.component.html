<nav class="bottom-nav">

  <!-- Following -->
  <a class="bnav-btn" routerLink="/feed" routerLinkActive="bnav-btn--active" aria-label="Following">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <span>Feed</span>
  </a>

  <!-- Search -->
  <button class="bnav-btn" aria-label="Search" (click)="openSearch()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <span>Search</span>
  </button>

  <!-- Compose -->
  <button class="bnav-btn bnav-btn--compose" aria-label="Post" (click)="openCompose()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span>Post</span>
  </button>

  <!-- Messages -->
  <button class="bnav-btn" aria-label="Messages" (click)="openMessages()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Messages</span>
  </button>

  <!-- Activity -->
  <a class="bnav-btn bnav-notif" routerLink="/dashboard/notifications"
     routerLinkActive="bnav-btn--active" aria-label="Notifications">
    <span class="bnav-notif-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      @if (notifService.unreadCount() > 0) {
        <span class="bnav-badge">{{ notifService.unreadCount() }}</span>
      }
    </span>
    <span>Activity</span>
  </a>

</nav>
