spring.application.name=hikebuddy-backend
server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── OAuth2 Google ──────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI}

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── App ───────────────────────────────────────────────────────────────────────
app.frontend-url=${FRONTEND_URL}
app.frontend-urls=${FRONTEND_URLS}
app.base-url=${BASE_URL:http://localhost:8080}

# ── Error responses ───────────────────────────────────────────────────────────
server.error.include-message=always

# ── AWS S3 ────────────────────────────────────────────────────────────────────
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.region=${AWS_REGION}
aws.s3.access-key=${AWS_S3_ACCESS_KEY}
aws.s3.secret-key=${AWS_S3_SECRET_KEY}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# ── Content Moderation ────────────────────────────────────────────────────────
moderation.enabled=true

# ── Email (Resend) ────────────────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY}
app.email.from=${MAIL_FROM:HikeBuddy <onboarding@resend.dev>}
app.email.enabled=true